services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ubearitz-api
    restart: on-failure
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://ubearitz:ubearitz_password@mariadb:3306/ubearitz
      JWT_SECRET: dev-only-secret-change-me
      HOST: 0.0.0.0
      PORT: 3001
    ports:
      - "3000:3001"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run prisma:generate && npm run dev"

  mariadb:
    image: mariadb:11.4
    container_name: ubearitz-mariadb
    restart: on-failure
    ports:
      - "3306:3306"
    environment:
      MARIADB_DATABASE: ubearitz
      MARIADB_USER: ubearitz
      MARIADB_PASSWORD: ubearitz_password
      MARIADB_ROOT_PASSWORD: root_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot_password --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  api_node_modules:
  mysql_data:

