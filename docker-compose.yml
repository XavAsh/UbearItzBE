services:
  mysql:
    image: mysql:8.4
    container_name: ubearitz-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ubearitz
      MYSQL_USER: ubearitz
      MYSQL_PASSWORD: ubearitz_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

