name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASS }}
          MARIADB_DATABASE: ubearitz_test
          MARIADB_USER: ubearitz
          MARIADB_PASSWORD: ubearitz_password
        ports:
          - 3306:3306

    env:
      DATABASE_URL: mysql://root:${{ secrets.MARIADB_ROOT_PASS }}@127.0.0.1:3306/ubearitz_test
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install mysql client
        run: sudo apt-get update && sudo apt-get install -y default-mysql-client

      - name: Wait for database
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -p"${{ secrets.MARIADB_ROOT_PASS }}" --silent; then
              echo "MariaDB is ready"
              exit 0
            fi
            sleep 2
          done
          echo "MariaDB not ready after 60s"
          exit 1

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm test

      - name: Build backend
        run: npm run build

      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ubearitz-backend
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
